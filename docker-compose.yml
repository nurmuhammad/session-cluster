services:

  # --- Postgres 18: faqat DATA (foydalanuvchilar) ---
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    volumes:
      # Postgres 18+ ma'lumotni /var/lib/postgresql ostidagi major-versiya
      # papkasida saqlaydi; mount ham shu darajada bo'lishi kerak (eski /data emas).
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Hazelcast cluster (2 node) — sessiya shu yerda ---
  hazelcast-1:
    build:
      context: .
      dockerfile: Dockerfile.hazelcast
    container_name: hazelcast-1

  hazelcast-2:
    build:
      context: .
      dockerfile: Dockerfile.hazelcast
    container_name: hazelcast-2

  # --- App instance 1 ---
  app1:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      INSTANCE_NAME: app1
      DB_URL: jdbc:postgresql://postgres:5432/appdb
      DB_USER: appuser
      DB_PASSWORD: apppass
      HZ_ADDRESSES: hazelcast-1:5701,hazelcast-2:5701
      HZ_CLUSTER: spring-session-cluster
    depends_on:
      postgres:
        condition: service_healthy
      hazelcast-1:
        condition: service_started
      hazelcast-2:
        condition: service_started

  # --- App instance 2 (aynan bir xil, faqat nom farq qiladi) ---
  app2:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      INSTANCE_NAME: app2
      DB_URL: jdbc:postgresql://postgres:5432/appdb
      DB_USER: appuser
      DB_PASSWORD: apppass
      HZ_ADDRESSES: hazelcast-1:5701,hazelcast-2:5701
      HZ_CLUSTER: spring-session-cluster
    depends_on:
      postgres:
        condition: service_healthy
      hazelcast-1:
        condition: service_started
      hazelcast-2:
        condition: service_started

  # --- Load balancer (nginx) ---
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"          # Browser: http://localhost:8080
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2

volumes:
  pgdata:
